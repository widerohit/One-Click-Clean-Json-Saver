<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>One-Click Clean JSON Saver</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Arial, Helvetica, sans-serif;
        --border: #d8dde6;
        --text: #1f2937;
        --muted: #667085;
        --accent: #0f766e;
        --accent-dark: #115e59;
        --surface: #ffffff;
        --soft: #f5f7fa;
      }

      * {
        box-sizing: border-box;
      }

      body {
        width: 390px;
        min-height: 460px;
        margin: 0;
        background: var(--surface);
        color: var(--text);
      }

      header {
        padding: 14px 14px 10px;
        border-bottom: 1px solid var(--border);
      }

      h1 {
        margin: 0 0 10px;
        font-size: 17px;
        font-weight: 700;
      }

      #searchInput {
        width: 100%;
        height: 34px;
        padding: 0 10px;
        border: 1px solid var(--border);
        border-radius: 6px;
        font-size: 13px;
      }

      main {
        max-height: 382px;
        overflow-y: auto;
      }

      .status {
        padding: 18px 14px;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.45;
      }

      .request {
        padding: 12px 14px;
        border-bottom: 1px solid var(--border);
        background: #fff;
      }

      .request:hover {
        background: var(--soft);
      }

      .request-top {
        display: flex;
        align-items: center;
        gap: 8px;
        min-width: 0;
      }

      .method {
        flex: 0 0 auto;
        min-width: 44px;
        padding: 3px 6px;
        border-radius: 4px;
        background: #e6f4f1;
        color: var(--accent-dark);
        font-size: 11px;
        font-weight: 700;
        text-align: center;
      }

      .url {
        flex: 1 1 auto;
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-size: 13px;
      }

      .status-code {
        flex: 0 0 auto;
        font-size: 12px;
        font-weight: 700;
      }

      .actions {
        display: flex;
        gap: 8px;
        margin-top: 10px;
      }

      button {
        height: 30px;
        border: 1px solid var(--border);
        border-radius: 6px;
        background: #fff;
        color: var(--text);
        cursor: pointer;
        font-size: 12px;
        font-weight: 700;
      }

      button.primary {
        flex: 1 1 auto;
        border-color: var(--accent);
        background: var(--accent);
        color: #fff;
      }

      button.secondary {
        width: 68px;
      }

      button:hover {
        filter: brightness(0.96);
      }

      footer {
        padding: 9px 14px;
        border-top: 1px solid var(--border);
        color: var(--muted);
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Clean JSON Saver</h1>
      <input id="searchInput" type="search" placeholder="Search captured API URLs">
    </header>
    <main id="requestList">
      <div class="status">Open a page that calls JSON APIs, then use the site normally.</div>
    </main>
    <footer id="footerStatus">Showing valid JSON responses only.</footer>
    <script src="popup.js"></script>
  </body>
</html>
