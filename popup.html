<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>One-Click Clean JSON Saver</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: system-ui, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        --text: #f1f5f9;
        --muted: #94a3b8;
        --border: rgba(148, 163, 184, 0.2);
        --surface: #12121a;
        --surface-2: #18181f;
        --glow-top: linear-gradient(90deg, #6366f1 0%, #8b5cf6 35%, #a855f7 65%, #ec4899 100%);
        --accent-soft: linear-gradient(135deg, rgba(16, 185, 129, 0.28) 0%, rgba(5, 150, 105, 0.22) 100%);
        --accent-text: #6ee7b7;
        --blue-2: #818cf8;
        --blue-soft: linear-gradient(135deg, rgba(79, 70, 229, 0.45) 0%, rgba(99, 102, 241, 0.32) 100%);
        --blue-text: #c7d2fe;
        --amber-soft: linear-gradient(135deg, rgba(234, 88, 12, 0.35) 0%, rgba(251, 146, 60, 0.22) 100%);
        --amber-text: #fdba74;
        --red-soft: linear-gradient(135deg, rgba(225, 29, 72, 0.38) 0%, rgba(244, 63, 94, 0.25) 100%);
        --red-text: #fda4af;
        --violet-glow: rgba(139, 92, 246, 0.12);
        --status-ok: #34d399;
        --status-err: #fb7185;
        --status-warn: #fbbf24;
        --card-shadow: 0 1px 2px rgba(0, 0, 0, 0.5), 0 4px 14px rgba(0, 0, 0, 0.45);
        --card-shadow-hover: 0 2px 10px rgba(0, 0, 0, 0.55), 0 8px 28px rgba(99, 102, 241, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        width: 560px;
        height: 580px;
        max-height: 580px;
        margin: 0;
        display: flex;
        flex-direction: column;
        background: linear-gradient(165deg, #030303 0%, #0a0a0e 45%, #0c0c12 100%);
        color: var(--text);
      }

      body::before {
        content: "";
        display: block;
        height: 4px;
        background: var(--glow-top);
      }

      header {
        flex-shrink: 0;
        padding: 12px 12px 10px;
        background: linear-gradient(180deg, rgba(18, 18, 24, 0.98) 0%, rgba(10, 10, 14, 0.96) 100%);
        border-bottom: 1px solid var(--border);
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.5);
      }

      h1 {
        margin: 0;
        font-size: 18px;
        font-weight: 800;
        letter-spacing: -0.02em;
        background: linear-gradient(90deg, #f8fafc 0%, #a5b4fc 45%, #c4b5fd 100%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }

      .header-top {
        display: flex;
        align-items: center;
        gap: 8px;
        justify-content: space-between;
        margin-bottom: 10px;
      }

      .header-actions {
        display: flex;
        gap: 6px;
      }

      .control-row {
        display: flex;
        gap: 6px;
        margin-bottom: 8px;
      }

      .search-row {
        display: flex;
        gap: 6px;
      }

      #domainFilterInput.domain-inline {
        flex: 0 0 160px;
      }

      #searchInput {
        flex: 1 1 auto;
        min-width: 0;
        height: 34px;
        padding: 0 10px;
        border: 1px solid var(--border);
        border-radius: 8px;
        font-size: 12px;
        color: var(--text);
        background: #0c0c10;
        box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.45);
        transition: border-color 0.15s ease, box-shadow 0.15s ease;
      }

      #searchInput::placeholder {
        color: #64748b;
      }

      #searchInput:focus {
        outline: none;
        border-color: var(--blue-2);
        box-shadow: 0 0 0 3px rgba(129, 140, 248, 0.28);
      }

      button.icon-button {
        flex: 0 0 auto;
        width: 34px;
        height: 34px;
        padding: 0;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: 1px solid rgba(129, 140, 248, 0.45);
        background: var(--blue-soft);
        color: var(--blue-text);
        border-radius: 8px;
      }

      button.icon-button svg {
        display: block;
        flex-shrink: 0;
      }

      .filters {
        display: grid;
        gap: 8px;
        margin-top: 8px;
      }

      .filter-row {
        display: flex;
        gap: 6px;
      }

      .filter-row select,
      #domainFilterInput {
        min-width: 0;
        height: 30px;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 0 8px;
        background: #0c0c10;
        color: var(--text);
        font-size: 11px;
        box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.4);
      }

      .filter-row select:focus,
      #domainFilterInput:focus {
        outline: none;
        border-color: var(--blue-2);
        box-shadow: 0 0 0 2px rgba(129, 140, 248, 0.28);
      }

      #domainFilterInput::placeholder {
        color: #64748b;
      }

      .filter-row select {
        flex: 1 1 0;
      }

      #domainFilterInput {
        width: 100%;
      }

      .main-layout {
        display: flex;
        flex-direction: row;
        flex: 1 1 auto;
        align-items: stretch;
        min-height: 0;
        min-width: 0;
        overflow: hidden;
      }

      .main-layout.has-preview #previewPanel {
        display: flex;
        flex-direction: column;
      }

      main#requestList {
        flex: 1 1 auto;
        min-width: 0;
        max-height: none;
        height: 100%;
        overflow-y: auto;
        scrollbar-color: rgba(129, 140, 248, 0.45) #0a0a0e;
        scrollbar-width: thin;
      }

      .main-layout.has-preview main#requestList {
        flex: 1 1 52%;
      }

      .status {
        padding: 18px 14px;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.55;
        text-align: center;
      }

      .request {
        margin: 6px 8px;
        padding: 8px 10px;
        border-radius: 10px;
        border: 1px solid rgba(148, 163, 184, 0.14);
        background: linear-gradient(145deg, #14141c 0%, #101016 100%);
        box-shadow: var(--card-shadow);
        transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
      }

      .request:hover {
        border-color: rgba(129, 140, 248, 0.35);
        box-shadow: var(--card-shadow-hover);
      }

      .request.active-preview {
        border-color: rgba(129, 140, 248, 0.55);
        background: linear-gradient(135deg, rgba(49, 46, 129, 0.55) 0%, rgba(76, 29, 149, 0.35) 100%);
        box-shadow: 0 0 0 2px rgba(129, 140, 248, 0.3), var(--card-shadow-hover);
      }

      .request-top {
        display: flex;
        align-items: flex-start;
        gap: 6px;
        min-width: 0;
      }

      .method {
        flex: 0 0 auto;
        min-width: 42px;
        padding: 3px 7px;
        border-radius: 6px;
        font-size: 9px;
        font-weight: 800;
        letter-spacing: 0.04em;
        text-align: center;
        text-transform: uppercase;
        background: linear-gradient(135deg, rgba(99, 102, 241, 0.45) 0%, rgba(139, 92, 246, 0.3) 100%);
        color: #e0e7ff;
        border: 1px solid rgba(129, 140, 248, 0.4);
      }

      .method[data-method="GET"] {
        background: linear-gradient(135deg, rgba(16, 185, 129, 0.42) 0%, rgba(5, 150, 105, 0.28) 100%);
        color: #6ee7b7;
        border-color: rgba(52, 211, 153, 0.45);
      }

      .method[data-method="POST"] {
        background: linear-gradient(135deg, rgba(59, 130, 246, 0.45) 0%, rgba(37, 99, 235, 0.28) 100%);
        color: #93c5fd;
        border-color: rgba(96, 165, 250, 0.45);
      }

      .method[data-method="PUT"],
      .method[data-method="PATCH"] {
        background: linear-gradient(135deg, rgba(245, 158, 11, 0.42) 0%, rgba(217, 119, 6, 0.28) 100%);
        color: #fcd34d;
        border-color: rgba(251, 191, 36, 0.45);
      }

      .method[data-method="DELETE"] {
        background: linear-gradient(135deg, rgba(244, 63, 94, 0.42) 0%, rgba(225, 29, 72, 0.28) 100%);
        color: #fda4af;
        border-color: rgba(251, 113, 133, 0.45);
      }

      .url {
        flex: 1 1 auto;
        min-width: 0;
        overflow: hidden;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        line-clamp: 2;
        white-space: normal;
        word-break: break-word;
        font-size: 12px;
        font-weight: 600;
        line-height: 1.3;
        color: #e2e8f0;
      }

      .status-code {
        flex: 0 0 auto;
        font-size: 11px;
        font-weight: 800;
        font-variant-numeric: tabular-nums;
      }

      .count {
        flex: 0 0 auto;
        padding: 2px 6px;
        border-radius: 999px;
        background: linear-gradient(135deg, rgba(124, 58, 237, 0.45) 0%, rgba(109, 40, 217, 0.32) 100%);
        color: #e9d5ff;
        font-size: 10px;
        font-weight: 800;
        border: 1px solid rgba(167, 139, 250, 0.4);
      }

      .request-info {
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
        margin-top: 6px;
      }

      .meta-chip {
        display: inline-flex;
        align-items: center;
        max-width: 100%;
        padding: 2px 6px;
        border-radius: 999px;
        border: 1px solid rgba(148, 163, 184, 0.16);
        background: rgba(148, 163, 184, 0.08);
        color: var(--muted);
        font-size: 10px;
        font-weight: 600;
        line-height: 1.2;
      }

      .actions {
        display: flex;
        gap: 6px;
        margin-top: 8px;
      }

      button {
        height: 28px;
        border: 1px solid rgba(148, 163, 184, 0.22);
        border-radius: 7px;
        background: #1a1a22;
        color: var(--text);
        cursor: pointer;
        font-size: 11px;
        font-weight: 700;
        transition: transform 0.1s ease, box-shadow 0.15s ease, filter 0.15s ease;
      }

      button:focus-visible {
        outline: none;
        box-shadow: 0 0 0 3px rgba(129, 140, 248, 0.4);
      }

      button:active {
        transform: scale(0.98);
      }

      button.primary {
        flex: 0 0 auto;
        min-width: 78px;
        padding: 0 8px;
        border-color: rgba(5, 150, 105, 0.45);
        background: var(--accent-soft);
        color: var(--accent-text);
      }

      button.primary:hover {
        filter: brightness(1.08);
        box-shadow: 0 2px 12px rgba(16, 185, 129, 0.35);
      }

      button.secondary {
        width: 52px;
      }

      button.clear {
        flex: 0 0 auto;
        width: 56px;
        height: 28px;
        border-color: rgba(225, 29, 72, 0.4);
        background: var(--red-soft);
        color: var(--red-text);
      }

      button.export {
        flex: 0 0 auto;
        width: 78px;
        height: 28px;
        border-color: rgba(5, 150, 105, 0.45);
        background: var(--accent-soft);
        color: var(--accent-text);
      }

      button.toggle,
      button.options {
        flex: 1 1 0;
        height: 30px;
        border-radius: 8px;
      }

      button.toggle {
        border-color: rgba(234, 88, 12, 0.4);
        background: var(--amber-soft);
        color: var(--amber-text);
      }

      button.options,
      button.preview {
        border-color: rgba(79, 70, 229, 0.4);
        background: var(--blue-soft);
        color: var(--blue-text);
      }

      button.preview {
        width: 58px;
      }

      button:hover {
        filter: brightness(1.03);
      }

      button.clear:hover {
        box-shadow: 0 2px 12px rgba(244, 63, 94, 0.35);
      }

      button.export:hover {
        box-shadow: 0 2px 12px rgba(16, 185, 129, 0.35);
      }

      button.toggle:hover {
        box-shadow: 0 2px 12px rgba(251, 146, 60, 0.3);
      }

      button.options:hover,
      button.preview:hover,
      button.icon-button:hover {
        box-shadow: 0 2px 12px rgba(129, 140, 248, 0.3);
      }

      #previewPanel {
        display: none;
        flex-direction: column;
        flex: 1 1 48%;
        max-width: 48%;
        min-width: 0;
        min-height: 0;
        border-right: 1px solid var(--border);
        background: linear-gradient(180deg, #0e0e14 0%, #08080c 100%);
      }

      .preview-header {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 10px;
        border-bottom: 1px solid var(--border);
        background: rgba(18, 18, 26, 0.95);
      }

      .preview-search {
        display: grid;
        gap: 6px;
        padding: 8px 10px;
        border-bottom: 1px solid var(--border);
        background: rgba(12, 12, 18, 0.9);
      }

      .preview-search-row {
        display: flex;
        gap: 8px;
      }

      #previewSearchInput {
        flex: 1 1 auto;
        min-width: 0;
        width: 100%;
        height: 28px;
        border: 1px solid var(--border);
        border-radius: 7px;
        padding: 0 8px;
        font-size: 11px;
        color: var(--text);
        background: #0c0c10;
      }

      #previewSearchInput::placeholder {
        color: #64748b;
      }

      #previewSearchInput:focus {
        outline: none;
        border-color: var(--blue-2);
        box-shadow: 0 0 0 2px rgba(129, 140, 248, 0.28);
      }

      .search-nav {
        width: 30px;
        border-radius: 7px;
        border-color: rgba(129, 140, 248, 0.45);
        background: var(--blue-soft);
        color: var(--blue-text);
        font-size: 14px;
        font-weight: 800;
        line-height: 1;
      }

      #previewSearchStatus {
        color: var(--muted);
        font-size: 10px;
        font-weight: 600;
      }

      .preview-title {
        flex: 1 1 auto;
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-size: 11px;
        font-weight: 800;
        color: #c7d2fe;
      }

      .preview-actions {
        display: flex;
        gap: 4px;
      }

      .preview-actions .secondary {
        width: auto;
        min-width: 52px;
        padding: 0 8px;
      }

      #previewContent {
        flex: 1 1 auto;
        min-height: 0;
        margin: 0;
        padding: 10px 12px;
        overflow: auto;
        font-family: "Cascadia Code", "Fira Code", Consolas, Monaco, "Courier New", monospace;
        font-size: 11px;
        line-height: 1.45;
        white-space: pre-wrap;
        word-break: break-word;
        background: linear-gradient(180deg, #1e1b4b 0%, #0f172a 100%);
        color: #e2e8f0;
        border-radius: 0;
        scrollbar-color: rgba(139, 92, 246, 0.5) transparent;
      }

      .json-key {
        color: #93c5fd;
      }

      .json-string {
        color: #6ee7b7;
      }

      .json-number {
        color: #fcd34d;
      }

      .json-boolean {
        color: #c4b5fd;
      }

      .json-null {
        color: #fb7185;
      }

      mark {
        border-radius: 4px;
        background: rgba(250, 204, 21, 0.38);
        color: #fef9c3;
        padding: 0 2px;
      }

      mark.active-match {
        background: linear-gradient(135deg, #f97316 0%, #ea580c 100%);
        color: #fff;
        box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.2);
      }

      footer {
        flex-shrink: 0;
        padding: 8px 12px;
        border-top: 1px solid var(--border);
        color: var(--muted);
        font-size: 10px;
        font-weight: 600;
        background: rgba(10, 10, 14, 0.92);
      }
    </style>
  </head>
  <body>
    <header>
      <div class="header-top">
        <h1>Clean JSON Saver</h1>
        <div class="header-actions">
          <button id="exportAllButton" class="export" type="button">Export ZIP</button>
          <button id="clearButton" class="clear" type="button">Clear</button>
        </div>
      </div>
      <div class="control-row">
        <button id="captureToggleButton" class="toggle" type="button">Pause Capture</button>
        <button id="optionsButton" class="options" type="button">Options</button>
      </div>
      <div class="search-row">
        <input id="searchInput" type="search" placeholder="Search URL or JSON">
        <input id="domainFilterInput" class="domain-inline" type="search" placeholder="Domain">
        <button
          id="saveSearchButton"
          class="icon-button"
          type="button"
          title="Save search"
          aria-label="Save search"
        >
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
        </button>
      </div>
      <div class="filters">
        <div class="filter-row">
          <select id="statusFilter" aria-label="Filter by status">
            <option value="all">All Status</option>
            <option value="2xx">2xx success</option>
            <option value="3xx">3xx redirect</option>
            <option value="4xx">4xx client error</option>
            <option value="5xx">5xx server error</option>
          </select>
          <select id="methodFilter" aria-label="Filter by method">
            <option value="all">All methods</option>
          </select>
        </div>
      </div>
    </header>
    <div class="main-layout" id="mainLayout">
      <section id="previewPanel" aria-live="polite">
        <div class="preview-header">
          <div id="previewTitle" class="preview-title">JSON Preview</div>
          <div class="preview-actions">
            <button id="previewModeButton" class="secondary" type="button">Raw</button>
            <button id="closePreviewButton" class="secondary" type="button">Close</button>
          </div>
        </div>
        <div class="preview-search">
          <div class="preview-search-row">
            <input id="previewSearchInput" type="search" placeholder="Search inside JSON">
            <button id="previousMatchButton" class="search-nav" type="button" aria-label="Previous match" title="Previous match">‹</button>
            <button id="nextMatchButton" class="search-nav" type="button" aria-label="Next match" title="Next match">›</button>
          </div>
          <div id="previewSearchStatus">No search term.</div>
        </div>
        <pre id="previewContent"></pre>
      </section>
      <main id="requestList">
        <div class="status">Open a page that calls JSON APIs, then use the site normally.</div>
      </main>
    </div>
    <footer id="footerStatus">Showing valid JSON responses only.</footer>
    <script src="popup.js"></script>
  </body>
</html>
