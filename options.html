<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>One-Click Clean JSON Saver Options</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: system-ui, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        --text: #f1f5f9;
        --muted: #94a3b8;
        --border: rgba(148, 163, 184, 0.22);
        --surface: #0c0c10;
        --card-bg: linear-gradient(145deg, #14141c 0%, #101016 100%);
        --accent-from: #059669;
        --accent-to: #10b981;
        --violet-glow: rgba(139, 92, 246, 0.14);
      }

      * {
        box-sizing: border-box;
      }

      body {
        max-width: 760px;
        margin: 0 auto;
        padding: 0 20px 40px;
        color: var(--text);
        background: linear-gradient(165deg, #030303 0%, #0a0a0e 45%, #0c0c12 100%);
        min-height: 100vh;
      }

      body::before {
        content: "";
        display: block;
        height: 5px;
        margin: 0 -20px 24px;
        background: linear-gradient(90deg, #6366f1 0%, #8b5cf6 35%, #a855f7 65%, #ec4899 100%);
      }

      h1 {
        margin: 0 0 8px;
        font-size: 26px;
        font-weight: 800;
        letter-spacing: -0.02em;
        background: linear-gradient(90deg, #f8fafc 0%, #a5b4fc 45%, #c4b5fd 100%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }

      p {
        margin: 0 0 26px;
        color: var(--muted);
        line-height: 1.55;
        font-size: 15px;
      }

      form {
        display: grid;
        gap: 20px;
      }

      label {
        display: grid;
        gap: 8px;
        font-size: 13px;
        font-weight: 700;
        color: #e2e8f0;
      }

      input,
      textarea {
        width: 100%;
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 11px 12px;
        font: inherit;
        color: var(--text);
        background: var(--surface);
        box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.45);
        transition: border-color 0.15s ease, box-shadow 0.15s ease;
      }

      input::placeholder,
      textarea::placeholder {
        color: #64748b;
      }

      input:focus,
      textarea:focus {
        outline: none;
        border-color: #818cf8;
        box-shadow: 0 0 0 3px rgba(129, 140, 248, 0.28);
      }

      textarea {
        min-height: 100px;
        resize: vertical;
        font-family: "Cascadia Code", Consolas, Monaco, monospace;
        font-size: 12px;
        line-height: 1.45;
      }

      .toggle {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 16px 18px;
        border: 1px solid rgba(129, 140, 248, 0.25);
        border-radius: 14px;
        background: var(--card-bg);
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.4), 0 8px 28px var(--violet-glow);
      }

      .toggle label {
        margin: 0;
      }

      .toggle input {
        width: 1.2rem;
        height: 1.2rem;
        accent-color: #818cf8;
        cursor: pointer;
        flex-shrink: 0;
      }

      .hint {
        color: var(--muted);
        font-size: 12px;
        font-weight: 500;
        line-height: 1.45;
      }

      .field-card {
        padding: 16px 18px;
        border-radius: 14px;
        border: 1px solid rgba(148, 163, 184, 0.14);
        background: var(--card-bg);
        box-shadow: 0 2px 14px rgba(0, 0, 0, 0.4);
      }

      .actions {
        display: flex;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
      }

      button {
        height: 40px;
        border: none;
        border-radius: 10px;
        padding: 0 20px;
        background: linear-gradient(135deg, var(--accent-from) 0%, var(--accent-to) 100%);
        color: #fff;
        cursor: pointer;
        font-weight: 800;
        font-size: 14px;
        letter-spacing: 0.01em;
        box-shadow: 0 2px 12px rgba(16, 185, 129, 0.4);
        transition: transform 0.1s ease, box-shadow 0.15s ease;
      }

      button:hover {
        box-shadow: 0 4px 20px rgba(16, 185, 129, 0.5);
      }

      button:active {
        transform: scale(0.98);
      }

      button:focus-visible {
        outline: none;
        box-shadow: 0 0 0 3px rgba(52, 211, 153, 0.45), 0 2px 12px rgba(16, 185, 129, 0.4);
      }

      #status {
        color: #6ee7b7;
        font-size: 13px;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <h1>One-Click Clean JSON Saver</h1>
    <p>Configure capture behavior and cleaning rules. All settings stay local in Chrome.</p>

    <form id="optionsForm">
      <div class="toggle">
        <label for="captureEnabled">
          Capture API responses
          <span class="hint">Turn this off when you want the extension to stop collecting responses.</span>
        </label>
        <input id="captureEnabled" type="checkbox">
      </div>

      <div class="field-card">
        <label for="maxRequests">
          Max responses per tab
          <input id="maxRequests" type="number" min="10" max="200" step="10">
          <span class="hint">Allowed range: 10 to 200.</span>
        </label>
      </div>

      <div class="field-card">
        <label for="defaultSearchText">
          Default search text
          <input id="defaultSearchText" type="text" placeholder="Example: posts">
          <span class="hint">Used when the popup opens and no saved popup search exists.</span>
        </label>
      </div>

      <div class="field-card">
        <label for="cleanFields">
          Fields to remove when cleaning JSON
          <textarea id="cleanFields" spellcheck="false"></textarea>
          <span class="hint">Comma-separated keys. Example: headers,cookies,metadata,config,request</span>
        </label>
      </div>

      <div class="actions">
        <button type="submit">Save Options</button>
        <span id="status"></span>
      </div>
    </form>

    <script src="options.js"></script>
  </body>
</html>
